# nginx 反向代理 —— 把公网 80/443 转发到本机 streamlit(127.0.0.1:8501)。
# 作用：1) 用域名 + HTTPS 代替难看的 IP:8501  2) 隐藏真实端口  3) 统一入口好加防护
#
# 部署步骤（在 ECS 上，sudo）：
#   1. 把下面的 your-domain.com 改成你的域名（域名要先解析到 ECS 公网 IP）
#   2. sudo cp deploy/nginx-law-app.conf /etc/nginx/conf.d/law-app.conf
#   3. sudo nginx -t          # 测试配置语法
#   4. sudo systemctl reload nginx
#   5. 上 HTTPS（免费证书，自动改写本文件加 443）：
#        sudo yum install -y certbot python3-certbot-nginx   # CentOS/AliyunLinux
#        # 或 Ubuntu: sudo apt install -y certbot python3-certbot-nginx
#        sudo certbot --nginx -d your-domain.com
#      certbot 会自动加上 443 配置并把 80 重定向到 443，无需手动写。
#
# 注意：Streamlit 依赖 WebSocket（_stcore/stream），下面的 Upgrade/Connection 头必不可少，
#       漏了会出现"页面一直转圈/Please wait..."。

server {
    listen 80;
    server_name your-domain.com;   # ← 改成你的域名

    # 上传文件大小（合同 PDF / 图片），按需调大
    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;

        # 透传真实来源信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streamlit 的 WebSocket 必需，缺了页面会卡住
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 长连接超时（streamlit 会保持长连接）
        proxy_read_timeout 86400;
    }
}
